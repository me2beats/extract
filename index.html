<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Graph Composer</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="app">
        <div id="sidebar">
            <h2>Nodes</h2>
            <div class="node" draggable="true" data-type="time">Time</div>
            <div class="node" draggable="true" data-type="frequency">Frequency</div>
            <div class="node" draggable="true" data-type="constant">Constant</div>
            <div class="node" draggable="true" data-type="add">Add</div>
            <div class="node" draggable="true" data-type="multiply">Multiply</div>
            <div class="node" draggable="true" data-type="sin">Sin</div>
            <div class="node" draggable="true" data-type="sine-wave">Sine Wave</div>
            <div class="node" draggable="true" data-type="output">Output</div>
            <button id="play-button">Play</button>
        </div>
        <canvas id="canvas"></canvas>
    </div>
</body>
</html>
