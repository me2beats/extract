<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Graph Composer</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="app">
        <div id="sidebar">
            <h2>Nodes</h2>
            <div class="node" draggable="true" data-type="time">Time</div>
            <div class="node" draggable="true" data-type="frequency">Frequency</div>
            <div class="node" draggable="true" data-type="constant">Constant</div>
            <div class="node" draggable="true" data-type="add">Add</div>
            <div class="node" draggable="true" data-type="multiply">Multiply</div>
            <div class="node" draggable="true" data-type="sin">Sin</div>
            <div class="node" draggable="true" data-type="sine-wave">Sine Wave</div>
            <div class="node" draggable="true" data-type="random">Random</div>
            <hr>
            <div class="node" draggable="true" data-type="pi">Pi</div>
            <div class="node" draggable="true" data-type="mod">Modulo</div>
            <div class="node" draggable="true" data-type="sign">Sign</div>
            <div class="node" draggable="true" data-type="arcsin">Arcsin</div>
            <div class="node" draggable="true" data-type="min">Min</div>
            <div class="node" draggable="true" data-type="max">Max</div>
        </div>
        <canvas id="canvas"></canvas>
        <div id="controls">
            <button id="play-button"></button>
            <button id="buffer-info-button">Info</button>
        </div>
    </div>
    <div id="buffer-info-modal" class="hidden">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>Buffer Analysis</h2>
            <p><strong>Sample Count:</strong> <span id="sample-count"></span></p>
            <p><strong>Max Amplitude:</strong> <span id="max-amp"></span></p>
            <p><strong>Min Amplitude:</strong> <span id="min-amp"></span></p>
            <p><strong>RMS Power:</strong> <span id="rms-power"></span></p>
        </div>
    </div>
</body>
</html>
